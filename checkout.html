<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

.checkout-card{
border:none;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.qr-box{
border:2px dashed #ccc;
padding:20px;
border-radius:15px;
text-align:center;
}

</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      <img src="images/logo.png" height="70" alt="Gaurav Sweets">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="products.html">Products</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="checkout.html">Checkout</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- Header -->
<div class="container text-center mt-5">
<h1 class="fw-bold">Checkout</h1>
<p class="text-muted">Complete your order details</p>
</div>

<!-- Main Section -->
<div class="container mt-4 mb-5">

<div class="row g-4">

<!-- Customer Form -->
<div class="col-md-6">

<div class="card checkout-card p-4">

<h4 class="fw-bold mb-4">Customer Details</h4>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="customerName">
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="text" class="form-control" id="customerPhone">
</div>

<div class="mb-3">
<label class="form-label">Delivery Address</label>
<textarea class="form-control" rows="4"
id="customerAddress"></textarea>
</div>

</div>

</div>

<!-- Order Summary -->
<div class="col-md-6">

<div class="card checkout-card p-4">

<h4 class="fw-bold mb-4">Order Summary</h4>

<div id="orderSummary"></div>

<hr>

<div class="d-flex justify-content-between">
<h5>Subtotal</h5>
<h5>₹<span id="subtotal">0</span></h5>
</div>

<div class="d-flex justify-content-between">
<h5>Delivery Charges</h5>
<h5>₹20</h5>
</div>

<hr>

<div class="d-flex justify-content-between">
<h4 class="fw-bold">Final Total</h4>
<h4 class="text-danger fw-bold">
₹<span id="finalTotal">0</span>
</h4>
</div>

</div>

<!-- Payment -->
<div class="alert alert-warning mt-4">

    <h5 class="fw-bold mb-2">
        Cash on Delivery (COD)
    </h5>

    <p class="mb-0">
        Currently we are accepting Cash on Delivery orders only.
    </p>

</div>

<button class="btn btn-danger btn-lg w-100 mt-4"
onclick="placeOrder()">
Place Order
</button>

</div>

</div>

</div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
© 2026 Gaurav Sweets
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let summary = document.getElementById("orderSummary");

let subtotal = 0;

if(cart.length === 0){

summary.innerHTML = `
<div class="alert alert-warning">
Cart is empty
</div>
`;

}else{

cart.forEach(item => {

subtotal += item.price * item.qty;

summary.innerHTML += `

<div class="d-flex justify-content-between mb-2">

<div>
${item.name} x ${item.qty}
</div>

<div>
₹${item.price * item.qty}
</div>

</div>
`;

});

}

document.getElementById("subtotal").innerText = subtotal;

document.getElementById("finalTotal").innerText = subtotal + 20;

async function placeOrder() {

    let name = document.getElementById("customerName").value;

    let phone = document.getElementById("customerPhone").value;

    let address = document.getElementById("customerAddress").value;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (name === "" || phone === "" || address === "") {

        alert("Please fill all details");

        return;
    }

    if (cart.length === 0) {

        alert("Your cart is empty");

        return;
    }

    const orderData = {

        name,
        phone,
        address,
        cart

    };

    try {

        const response = await fetch("https://gauravsweets-backend.onrender.com/place-order", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(orderData)

        });

        const data = await response.json();

        if (data.success) {

            localStorage.removeItem("cart");

            localStorage.setItem("lastOrderId", data.orderId);

            window.location.href = "success.html";

        } else {

            alert("Something went wrong");

        }

    } catch (error) {

        console.error(error);

        alert("Server error");

    }
}

</script>

</body>
</html>
