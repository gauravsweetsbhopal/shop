<!DOCTYPE html>
<html lang="en">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Successful</title>

<link rel="icon" type="image/png" href="images/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {

    background: #f8f9fa;

}

.success-box {

    max-width: 600px;

    margin: 80px auto;

    background: white;

    padding: 40px;

    border-radius: 20px;

    box-shadow: 0 0 25px rgba(0,0,0,0.1);

    text-align: center;

}

.checkmark {

    font-size: 90px;

    color: #28a745;

}

.order-id {

    font-size: 22px;

    font-weight: bold;

    color: #dc3545;

}

</style>

</head>

<body>

<div class="container">

    <div class="success-box">

        <div class="checkmark">
            ✓
        </div>

        <h1 class="fw-bold text-success mt-3">
            Order Placed Successfully!
        </h1>

        <p class="mt-4 text-muted">
            Thank you for ordering from Gaurav Sweets.
        </p>

        <p>
            Your order has been received and will be confirmed shortly.
        </p>

        <div class="order-id mt-4">

            Order ID:
            <span id="orderId"></span>

        </div>

        <div class="mt-4">

            <a href="products.html" class="btn btn-danger btn-lg">

                Continue Shopping

            </a>

        </div>

    </div>

</div>

<script>

const orderId = localStorage.getItem("lastOrderId");

document.getElementById("orderId").innerText = orderId;

</script>

</body>
</html>
